[mypy]
# Python version
python_version = 3.11

# Import discovery
files = coshsh, recipes, tests
namespace_packages = True
explicit_package_bases = True

# Platform configuration
platform = linux

# Disallow dynamic typing
disallow_any_unimported = False
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False
disallow_any_generics = False
disallow_subclassing_any = False

# Untyped definitions and calls
disallow_untyped_calls = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False

# None and Optional handling
no_implicit_optional = True
strict_optional = True

# Configuring warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = False
warn_unreachable = True

# Miscellaneous strictness flags
allow_untyped_globals = True
allow_redefinition = True
local_partial_types = False
implicit_reexport = True
strict_equality = True

# Configuring error messages
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True
color_output = True
error_summary = True

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Advanced options
warn_incomplete_stub = True
warn_unused_configs = True

# Per-module options for external dependencies
[mypy-jinja2.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-pycryptodomex.*]
ignore_missing_imports = True

# Phase-by-phase strictness increase
# Start lenient, gradually increase strictness for modernized files
[mypy-coshsh.util]
disallow_untyped_defs = False

[mypy-coshsh.templaterule]
disallow_untyped_defs = False

[mypy-coshsh.datainterface]
disallow_untyped_defs = False

[mypy-coshsh.configparser]
disallow_untyped_defs = False

# Domain model classes
[mypy-coshsh.item]
disallow_untyped_defs = False

[mypy-coshsh.datasource]
disallow_untyped_defs = False

[mypy-coshsh.datarecipient]
disallow_untyped_defs = False

[mypy-coshsh.application]
disallow_untyped_defs = False

[mypy-coshsh.host]
disallow_untyped_defs = False

[mypy-coshsh.contact]
disallow_untyped_defs = False

[mypy-coshsh.contactgroup]
disallow_untyped_defs = False

[mypy-coshsh.hostgroup]
disallow_untyped_defs = False

[mypy-coshsh.monitoringdetail]
disallow_untyped_defs = False

[mypy-coshsh.dependency]
disallow_untyped_defs = False

# Orchestration layer
[mypy-coshsh.recipe]
disallow_untyped_defs = False

[mypy-coshsh.generator]
disallow_untyped_defs = False

[mypy-coshsh.jinja2_extensions]
disallow_untyped_defs = False

[mypy-coshsh.vault]
disallow_untyped_defs = False
